<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KomaOS — External Display</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');

    :root {
        --accent: #0ff;
        --accent-glow: rgba(0,255,255,0.25);
        --glass-bg: rgba(255,255,255,0.04);
        --glass-border: rgba(255,255,255,0.08);
        --glass-blur: 24px;
        --text-primary: rgba(255,255,255,0.95);
        --text-secondary: rgba(255,255,255,0.5);
        --window-radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    html, body {
        width: 100vw; height: 100vh; overflow: hidden;
        background: #000; color: var(--text-primary);
    }

    /* Background — matches main OS or uses saved wallpaper */
    #receiver-bg {
        position: fixed; inset: 0; z-index: 0;
        background: radial-gradient(ellipse at 30% 40%, #0a0a2e 0%, #050510 60%, #000 100%);
    }
    #receiver-bg video {
        width: 100%; height: 100%; object-fit: cover; opacity: 0.6;
    }

    /* Glass overlay for depth */
    #receiver-glass-overlay {
        position: fixed; inset: 0; z-index: 1;
        backdrop-filter: blur(1px);
        background: rgba(0,0,0,0.15);
        pointer-events: none;
    }

    /* Status bar */
    #receiver-status {
        position: fixed; top: 0; left: 0; right: 0; height: 32px;
        z-index: 1000; display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        font-size: 12px; color: var(--text-secondary);
    }
    #receiver-status .status-left { display: flex; align-items: center; gap: 8px; }
    #receiver-status .status-right { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: statusPulse 2s ease-in-out infinite; }
    @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-label { font-weight: 500; color: var(--text-primary); letter-spacing: 1px; }

    /* Waiting state */
    #waiting-state {
        position: fixed; inset: 0; z-index: 500;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 24px; pointer-events: none;
    }
    .waiting-ring {
        width: 120px; height: 120px; border-radius: 50%;
        border: 2px solid transparent; border-top-color: var(--accent);
        animation: waitSpin 1.5s linear infinite;
        position: relative;
    }
    .waiting-ring::after {
        content: ''; position: absolute; inset: 8px; border-radius: 50%;
        border: 1px solid transparent; border-bottom-color: rgba(0,255,255,0.3);
        animation: waitSpin 2.5s linear infinite reverse;
    }
    @keyframes waitSpin { to { transform: rotate(360deg); } }
    .waiting-text { font-size: 14px; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; }
    .waiting-sub { font-size: 11px; color: rgba(255,255,255,0.25); }
    #waiting-state.hidden { display: none; }

    /* Window container */
    #window-canvas {
        position: fixed; inset: 0; z-index: 10;
        padding-top: 32px;
    }

    /* Teleported window */
    .teleport-window {
        position: absolute;
        background: rgba(20,20,35,0.7);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        border-radius: var(--window-radius);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
        overflow: hidden;
        transform: scaleX(0.1);
        opacity: 0;
        transform-origin: left center;
        will-change: transform, opacity;
    }
    .teleport-window.entering-left { transform-origin: left center; animation: enterFromLeft 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    .teleport-window.entering-right { transform-origin: right center; animation: enterFromRight 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    .teleport-window.exiting { animation: exitWindow 0.3s ease-in forwards; }

    @keyframes enterFromLeft {
        0% { transform: translateX(-30px) scaleX(0.1); opacity: 0; }
        60% { transform: translateX(5px) scaleX(1.02); opacity: 0.9; }
        100% { transform: translateX(0) scaleX(1); opacity: 1; }
    }
    @keyframes enterFromRight {
        0% { transform: translateX(30px) scaleX(0.1); opacity: 0; }
        60% { transform: translateX(-5px) scaleX(1.02); opacity: 0.9; }
        100% { transform: translateX(0) scaleX(1); opacity: 1; }
    }
    @keyframes exitWindow {
        to { transform: scale(0.8); opacity: 0; }
    }

    /* Window titlebar */
    .teleport-titlebar {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; height: 36px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid var(--glass-border);
        cursor: move; user-select: none;
    }
    .teleport-titlebar .dots { display: flex; gap: 6px; }
    .teleport-titlebar .dot { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; transition: 0.15s; }
    .teleport-titlebar .dot:hover { filter: brightness(1.3); }
    .dot-close { background: #ff5f57; }
    .dot-min { background: #febc2e; }
    .dot-max { background: #28c840; }
    .teleport-titlebar .title { font-size: 12px; font-weight: 500; opacity: 0.7; margin-left: 6px; }

    /* Window body */
    .teleport-body {
        padding: 0; overflow: auto; color: var(--text-primary);
    }

    /* Neon particle trail */
    .neon-particle {
        position: fixed; z-index: 99999; pointer-events: none;
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px 3px var(--accent-glow), 0 0 20px 6px rgba(0,255,255,0.15);
        will-change: transform, opacity;
    }

    /* Sonar entry ring */
    .entry-sonar {
        position: fixed; z-index: 99998; pointer-events: none;
        width: 40px; height: 40px; border-radius: 50%;
        border: 2px solid var(--accent);
        box-shadow: 0 0 20px var(--accent-glow);
        animation: sonarExpand 0.8s ease-out forwards;
    }
    @keyframes sonarExpand {
        0% { transform: scale(0.5); opacity: 1; }
        100% { transform: scale(8); opacity: 0; }
    }

    /* Connection lost overlay */
    #connection-lost {
        position: fixed; inset: 0; z-index: 9000;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(20px);
        gap: 16px;
    }
    #connection-lost.show { display: flex; }
    #connection-lost .icon { font-size: 48px; opacity: 0.3; }
    #connection-lost .msg { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
    #connection-lost .sub { font-size: 12px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div id="receiver-bg">
    <video id="receiver-bg-video" autoplay loop muted playsinline></video>
</div>
<div id="receiver-glass-overlay"></div>

<div id="receiver-status">
    <div class="status-left">
        <div class="status-dot"></div>
        <span class="status-label">KomaOS External Display</span>
    </div>
    <div class="status-right">
        <span id="rx-window-count">0 windows</span>
        <span id="rx-fps">60 fps</span>
        <span id="rx-clock"></span>
    </div>
</div>

<div id="waiting-state">
    <div class="waiting-ring"></div>
    <div class="waiting-text">Awaiting Connection</div>
    <div class="waiting-sub">Open KomaOS main display and push windows here</div>
</div>

<div id="window-canvas"></div>

<div id="connection-lost">
    <div class="icon">📡</div>
    <div class="msg">Connection Lost</div>
    <div class="sub">Main display was closed — windows will snap back</div>
</div>

<script>
// ============================================================
// KOMA OS EXTERNAL DISPLAY RECEIVER
// BroadcastChannel + Window Teleportation Engine
// ============================================================

const CHANNEL_NAME = 'koma_teleport_link';
const HEARTBEAT_INTERVAL = 2000;
const HEARTBEAT_TIMEOUT = 6000;

let channel = null;
let teleportedWindows = {};
let connected = false;
let lastHeartbeat = Date.now();
let fpsFrames = 0;
let fpsLast = performance.now();

// --- THEME LOADING ---
function loadTheme() {
    try {
        const cfg = JSON.parse(localStorage.getItem('koma_core_config') || '{}');
        const accent = cfg.accentColor || '#0ff';
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--accent-glow', accent + '40');

        // Try loading wallpaper
        const wallpaper = localStorage.getItem('koma_wallpaper_url');
        if (wallpaper) {
            const vid = document.getElementById('receiver-bg-video');
            vid.src = wallpaper;
            vid.onerror = () => { vid.style.display = 'none'; };
        }
    } catch(e) {}
}
loadTheme();

// --- CLOCK ---
function updateRxClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('rx-clock').textContent = h + ':' + m;
}
updateRxClock();
setInterval(updateRxClock, 30000);

// --- FPS COUNTER ---
function measureFPS() {
    fpsFrames++;
    const now = performance.now();
    if (now - fpsLast >= 1000) {
        document.getElementById('rx-fps').textContent = fpsFrames + ' fps';
        fpsFrames = 0;
        fpsLast = now;
    }
    requestAnimationFrame(measureFPS);
}
requestAnimationFrame(measureFPS);

// --- BROADCAST CHANNEL HANDSHAKE ---
function initChannel() {
    channel = new BroadcastChannel(CHANNEL_NAME);
    
    // Announce ourselves
    channel.postMessage({ type: 'receiver_ready', timestamp: Date.now() });

    channel.onmessage = function(e) {
        const msg = e.data;
        if (!msg || !msg.type) return;

        switch(msg.type) {
            case 'heartbeat':
                lastHeartbeat = Date.now();
                if (!connected) onConnected();
                break;

            case 'handshake_ack':
                lastHeartbeat = Date.now();
                if (!connected) onConnected();
                break;

            case 'teleport_window':
                receiveWindow(msg);
                break;

            case 'update_window':
                updateWindow(msg);
                break;

            case 'remove_window':
                removeWindow(msg.windowId);
                break;

            case 'sync_input':
                // Input sync from main OS (for remote control)
                handleRemoteInput(msg);
                break;

            case 'theme_update':
                applyRemoteTheme(msg);
                break;

            case 'snap_back_all':
                snapBackAll();
                break;
        }
    };

    channel.onmessageerror = function() {
        console.warn('BroadcastChannel message error');
    };
}

function onConnected() {
    connected = true;
    document.getElementById('waiting-state').classList.add('hidden');
    document.getElementById('connection-lost').classList.remove('show');
    channel.postMessage({ type: 'receiver_connected', timestamp: Date.now() });
}

function onDisconnected() {
    connected = false;
    document.getElementById('connection-lost').classList.add('show');
    // Notify main OS that all windows should snap back
    try { channel.postMessage({ type: 'receiver_closing', timestamp: Date.now() }); } catch(e) {}
    // Remove all teleported windows with exit animation
    Object.keys(teleportedWindows).forEach(id => {
        const el = teleportedWindows[id];
        if (el) {
            el.classList.add('exiting');
            setTimeout(() => el.remove(), 300);
        }
    });
    teleportedWindows = {};
    updateWindowCount();
}

// --- HEARTBEAT MONITORING ---
setInterval(() => {
    if (connected && (Date.now() - lastHeartbeat > HEARTBEAT_TIMEOUT)) {
        onDisconnected();
    }
}, HEARTBEAT_INTERVAL);

// --- WINDOW TELEPORTATION ---
function receiveWindow(msg) {
    const { windowId, title, icon, html, css, x, y, width, height, direction } = msg;

    // Remove existing if re-teleporting
    if (teleportedWindows[windowId]) {
        teleportedWindows[windowId].remove();
    }

    const win = document.createElement('div');
    win.className = 'teleport-window';
    win.id = 'tw-' + windowId;
    win.style.left = (x || 100) + 'px';
    win.style.top = (y || 60) + 'px';
    win.style.width = (width || 500) + 'px';
    win.style.height = (height || 400) + 'px';

    // Titlebar
    const titlebar = document.createElement('div');
    titlebar.className = 'teleport-titlebar';
    titlebar.innerHTML = `
        <div class="dots">
            <div class="dot dot-close" onclick="sendBackWindow('${windowId}')"></div>
            <div class="dot dot-min"></div>
            <div class="dot dot-max"></div>
        </div>
        <span class="title">${icon || ''} ${title || 'Window'}</span>
    `;
    win.appendChild(titlebar);

    // Body
    const body = document.createElement('div');
    body.className = 'teleport-body';
    body.style.height = 'calc(100% - 36px)';
    if (html) {
        body.innerHTML = html;
    }
    if (css) {
        const style = document.createElement('style');
        style.textContent = css;
        body.appendChild(style);
    }
    win.appendChild(body);

    // Make draggable on receiver
    makeDraggable(win, titlebar);

    // Forward interactions back to main OS
    body.addEventListener('click', function(e) {
        channel.postMessage({
            type: 'remote_click',
            windowId: windowId,
            x: e.offsetX, y: e.offsetY,
            targetTag: e.target.tagName,
            targetId: e.target.id,
            targetClass: e.target.className
        });
    });

    body.addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            channel.postMessage({
                type: 'remote_input',
                windowId: windowId,
                targetId: e.target.id,
                value: e.target.value
            });
        }
    });

    body.addEventListener('keydown', function(e) {
        channel.postMessage({
            type: 'remote_keydown',
            windowId: windowId,
            key: e.key,
            code: e.code,
            ctrlKey: e.ctrlKey,
            shiftKey: e.shiftKey,
            altKey: e.altKey
        });
    });

    document.getElementById('window-canvas').appendChild(win);
    teleportedWindows[windowId] = win;

    // Entry animation
    requestAnimationFrame(() => {
        win.classList.add(direction === 'right' ? 'entering-right' : 'entering-left');
    });

    // Neon particle trail at entry point
    spawnEntryParticles(direction === 'right' ? window.innerWidth : 0, y || window.innerHeight / 2);

    // Sonar ring
    spawnEntrySonar(direction === 'right' ? window.innerWidth - 20 : 20, (y || window.innerHeight / 2) + (height || 400) / 2);

    updateWindowCount();
}

function updateWindow(msg) {
    const win = teleportedWindows[msg.windowId];
    if (!win) return;
    const body = win.querySelector('.teleport-body');
    if (msg.html && body) body.innerHTML = msg.html;
    if (msg.x !== undefined) win.style.left = msg.x + 'px';
    if (msg.y !== undefined) win.style.top = msg.y + 'px';
    if (msg.width) win.style.width = msg.width + 'px';
    if (msg.height) win.style.height = msg.height + 'px';
}

function removeWindow(windowId) {
    const win = teleportedWindows[windowId];
    if (!win) return;
    win.classList.add('exiting');
    setTimeout(() => { win.remove(); delete teleportedWindows[windowId]; updateWindowCount(); }, 300);
}

function sendBackWindow(windowId) {
    channel.postMessage({ type: 'snap_back', windowId: windowId });
    removeWindow(windowId);
}

function snapBackAll() {
    Object.keys(teleportedWindows).forEach(id => removeWindow(id));
}

function updateWindowCount() {
    const count = Object.keys(teleportedWindows).length;
    document.getElementById('rx-window-count').textContent = count + ' window' + (count !== 1 ? 's' : '');
    if (count === 0 && connected) {
        document.getElementById('waiting-state').classList.remove('hidden');
        document.getElementById('waiting-state').querySelector('.waiting-text').textContent = 'Connected — Waiting for Windows';
    } else {
        document.getElementById('waiting-state').classList.add('hidden');
    }
}

// --- DRAGGABLE WINDOWS ---
function makeDraggable(win, handle) {
    let dragging = false, offsetX = 0, offsetY = 0;
    handle.addEventListener('mousedown', function(e) {
        dragging = true;
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
        win.style.zIndex = '100';
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        requestAnimationFrame(() => {
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
        });
    });
    document.addEventListener('mouseup', function() {
        if (dragging) {
            dragging = false;
            // Sync position back to main OS
            const id = win.id.replace('tw-', '');
            channel.postMessage({
                type: 'window_moved',
                windowId: id,
                x: win.offsetLeft,
                y: win.offsetTop
            });
        }
    });
}

// --- PARTICLE EFFECTS ---
function spawnEntryParticles(edgeX, centerY) {
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'neon-particle';
        const startY = centerY + (Math.random() - 0.5) * 200;
        p.style.left = edgeX + 'px';
        p.style.top = startY + 'px';
        p.style.transition = `all ${0.4 + Math.random() * 0.6}s cubic-bezier(0.22,1,0.36,1)`;
        document.body.appendChild(p);

        requestAnimationFrame(() => {
            const targetX = edgeX + (edgeX === 0 ? 1 : -1) * (80 + Math.random() * 120);
            p.style.left = targetX + 'px';
            p.style.top = (startY + (Math.random() - 0.5) * 80) + 'px';
            p.style.opacity = '0';
            p.style.transform = 'scale(0.2)';
        });
        setTimeout(() => p.remove(), 1200);
    }
}

function spawnEntrySonar(x, y) {
    const ring = document.createElement('div');
    ring.className = 'entry-sonar';
    ring.style.left = (x - 20) + 'px';
    ring.style.top = (y - 20) + 'px';
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 900);

    // Second delayed ring
    setTimeout(() => {
        const r2 = document.createElement('div');
        r2.className = 'entry-sonar';
        r2.style.left = (x - 20) + 'px';
        r2.style.top = (y - 20) + 'px';
        document.body.appendChild(r2);
        setTimeout(() => r2.remove(), 900);
    }, 200);
}

// --- REMOTE INPUT HANDLING ---
function handleRemoteInput(msg) {
    const win = teleportedWindows[msg.windowId];
    if (!win) return;
    if (msg.targetId) {
        const el = win.querySelector('#' + msg.targetId);
        if (el) el.value = msg.value || '';
    }
}

// --- THEME SYNC ---
function applyRemoteTheme(msg) {
    if (msg.accent) document.documentElement.style.setProperty('--accent', msg.accent);
    if (msg.wallpaper) {
        const vid = document.getElementById('receiver-bg-video');
        vid.src = msg.wallpaper;
    }
}

// --- WINDOW CLOSE DETECTION (snap-back trigger) ---
window.addEventListener('beforeunload', function() {
    try {
        channel.postMessage({ type: 'receiver_closing', timestamp: Date.now() });
    } catch(e) {}
});

// --- INIT ---
initChannel();

// Re-announce periodically in case main OS opens after receiver
setInterval(() => {
    if (!connected) {
        try { channel.postMessage({ type: 'receiver_ready', timestamp: Date.now() }); } catch(e) {}
    }
}, 3000);

// Prevent context menu
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
